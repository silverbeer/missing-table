<!-- MLS Next league badge — simplified SVG, NOT the official asset.
     Clean shield with MLS + NEXT wordmark. Designed to read clearly at
     the sizes used in the IG share card templates (~84-108px tall).
     Replace this file with the official MLS Next vector when you have
     a licensed copy; the IG share card references this exact path. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360" role="img"
     aria-label="MLS Next">
  <!-- Shield body: dark fill with cyan outline.
       Rounded top, tapered to a point at the bottom. -->
  <path d="M30 40
           Q30 20 50 20
           L270 20
           Q290 20 290 40
           L290 200
           Q290 280 160 340
           Q30 280 30 200
           Z"
        fill="#0a0a0a"
        stroke="#26d3e3"
        stroke-width="12"
        stroke-linejoin="round"/>

  <!-- Inner outline for depth -->
  <path d="M50 56
           L270 56
           L270 200
           Q270 264 160 318
           Q50 264 50 200
           Z"
        fill="none"
        stroke="#26d3e3"
        stroke-width="2"
        stroke-opacity="0.4"/>

  <!-- MLS tab (small wordmark at top) -->
  <text x="160" y="118"
        text-anchor="middle"
        font-family="Helvetica, Arial Black, sans-serif"
        font-size="56"
        font-weight="900"
        letter-spacing="4"
        fill="#ffffff">MLS</text>

  <!-- Divider line -->
  <line x1="80" y1="148" x2="240" y2="148"
        stroke="#26d3e3" stroke-width="3" stroke-linecap="round"/>

  <!-- NEXT wordmark (the hero text, in cyan) -->
  <text x="160" y="232"
        text-anchor="middle"
        font-family="Helvetica, Arial Black, sans-serif"
        font-size="72"
        font-weight="900"
        letter-spacing="2"
        fill="#26d3e3">NEXT</text>

  <!-- Small accent star below the wordmark -->
  <polygon points="160,260 168,278 188,280 172,292 178,310 160,302 142,310 148,292 132,280 152,278"
           fill="#26d3e3"/>
</svg>
