<!-- MLS Next league badge — SVG recreation, not the official asset.
     Approximates the cyan-on-black shield: "MLS" on a small tab,
     "NEXT" beneath, with a stylized 4-point burst replacing the X.
     Replace this file with the official MLS Next vector if you obtain
     a licensed copy; the IG share card references this exact path. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img"
     aria-label="MLS Next">
  <defs>
    <clipPath id="shieldClip">
      <path d="M40 50
               L280 50
               L280 180
               C280 240, 230 280, 160 305
               C90 280, 40 240, 40 180
               Z"/>
    </clipPath>
  </defs>

  <!-- Shield body (black) with cyan outline -->
  <g>
    <path d="M40 50
             L280 50
             L280 180
             C280 240, 230 280, 160 305
             C90 280, 40 240, 40 180
             Z"
          fill="#0a0a0a"
          stroke="#26d3e3"
          stroke-width="10"
          stroke-linejoin="round"/>
  </g>

  <!-- 'MLS' tab at top: small white pill -->
  <g clip-path="url(#shieldClip)">
    <rect x="120" y="62" width="80" height="38" rx="4" fill="#0a0a0a"
          stroke="#26d3e3" stroke-width="5"/>
    <text x="160" y="91"
          font-family="Helvetica Neue, Arial Black, sans-serif"
          font-size="30" font-weight="900"
          text-anchor="middle"
          fill="#ffffff"
          letter-spacing="1">MLS</text>
  </g>

  <!-- 4-point burst (the stylized X). Two crossing diamond points
       overlapping, scaled large enough to read at small sizes. -->
  <g clip-path="url(#shieldClip)">
    <!-- Horizontal point pair -->
    <polygon points="160,205 235,160 160,170 85,160"
             fill="#26d3e3"/>
    <!-- Vertical point pair -->
    <polygon points="160,205 175,160 160,108 145,160"
             fill="#26d3e3"/>
    <!-- Reverse-vertical, lower half -->
    <polygon points="160,205 175,260 160,290 145,260"
             fill="#26d3e3"/>
  </g>

  <!-- 'NEXT' wordmark spanning the X, with the center letter (X)
       formed by the burst above. -->
  <g clip-path="url(#shieldClip)" font-family="Helvetica Neue, Arial Black, sans-serif"
     font-weight="900" font-size="62" fill="#ffffff" text-anchor="middle">
    <text x="92" y="195" letter-spacing="-1">N</text>
    <text x="118" y="195" letter-spacing="-1">E</text>
    <!-- The X is the cyan burst behind these letters; we leave a gap -->
    <text x="208" y="195" letter-spacing="-1">T</text>
  </g>
</svg>
