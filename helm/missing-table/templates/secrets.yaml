{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "missing-table.fullname" . }}-secrets
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "missing-table.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  # Database credentials
  database-url: {{ .Values.secrets.databaseUrl | quote }}

  # Supabase credentials
  supabase-url: {{ .Values.secrets.supabaseUrl | quote }}
  supabase-anon-key: {{ .Values.secrets.supabaseAnonKey | quote }}
  supabase-service-key: {{ .Values.secrets.supabaseServiceKey | quote }}
  supabase-jwt-secret: {{ .Values.secrets.supabaseJwtSecret | quote }}

  # Application secrets
  service-account-secret: {{ .Values.secrets.serviceAccountSecret | quote }}

  # Email (Resend) - for password reset emails
  {{- if .Values.secrets.resendApiKey }}
  resend-api-key: {{ .Values.secrets.resendApiKey | quote }}
  {{- end }}

  # Telegram bot token - for live-match notifications (Phase 6 of #315)
  # In prod this key is populated by External Secrets Operator from AWS
  # Secrets Manager, so values-prod.yaml has no secrets block and this
  # conditional is harmless there.
  {{- if .Values.secrets.telegramBotToken }}
  telegram-bot-token: {{ .Values.secrets.telegramBotToken | quote }}
  {{- end }}

  # Resend Inbound webhook signing secret - Support Inbox (SB-35).
  # In prod populated by ESO from AWS Secrets Manager; same convention as
  # telegram-bot-token above.
  {{- if .Values.secrets.emailInboundWebhookSecret }}
  email-inbound-webhook-secret: {{ .Values.secrets.emailInboundWebhookSecret | quote }}
  {{- end }}

  # VAPID keypair + subject - Web Push notifications (SB-51).
  # In prod populated by ESO from AWS Secrets Manager (see SB-50).
  # public_key is non-secret but stored alongside for consistency. Backend
  # boots without these and the push sender no-ops, so `optional: true` on
  # the env var in backend.yaml is the safety net.
  {{- if .Values.secrets.vapidPublicKey }}
  vapid-public-key: {{ .Values.secrets.vapidPublicKey | quote }}
  {{- end }}
  {{- if .Values.secrets.vapidPrivateKey }}
  vapid-private-key: {{ .Values.secrets.vapidPrivateKey | quote }}
  {{- end }}
  {{- if .Values.secrets.vapidSubject }}
  vapid-subject: {{ .Values.secrets.vapidSubject | quote }}
  {{- end }}

  # RabbitMQ connection (for match-scraper CronJob)
  {{- if .Values.rabbitmq }}
  rabbitmq-url: {{ printf "amqp://%s:%s@%s:%d//" .Values.rabbitmq.username .Values.rabbitmq.password .Values.rabbitmq.host (.Values.rabbitmq.port | int) | quote }} # pragma: allowlist secret
  {{- end }}
{{- end }}
---
{{- if and .Values.imageCredentials .Values.imageCredentials.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "missing-table.fullname" . }}-ghcr  #pragma: allowlist secret
  namespace: {{ .Values.namespace }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf "{\"auths\":{\"%s\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}" .Values.imageCredentials.registry .Values.imageCredentials.username .Values.imageCredentials.password (printf "%s:%s" .Values.imageCredentials.username .Values.imageCredentials.password | b64enc) | b64enc }}
{{- end }}
