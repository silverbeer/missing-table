apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "missing-table.fullname" . }}-backend
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "missing-table.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  revisionHistoryLimit: {{ .Values.backend.revisionHistoryLimit | default 3 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "missing-table.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "missing-table.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: backend
      annotations:
        # Force pod restart on each deployment (image tag stays same)
        rollout/commitSha: {{ .Values.commitSha | default "unknown" | quote }}
        rollout/buildId: {{ .Values.buildId | default "unknown" | quote }}
        # Grafana Alloy autodiscovery annotations (k8s-monitoring chart v2)
        k8s.grafana.com/scrape: "true"
        k8s.grafana.com/metrics.portNumber: "8000"
        k8s.grafana.com/metrics.path: "/metrics"
    spec:
      {{- if .Values.imageCredentials }}
      imagePullSecrets:
        - name: {{ include "missing-table.fullname" . }}-ghcr
      {{- end }}
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - containerPort: 8000
          name: http
        env:
        # Sensitive values from secrets
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "missing-table.fullname" . }}-secrets
              key: database-url
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "missing-table.fullname" . }}-secrets
              key: supabase-url
        - name: SUPABASE_ANON_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "missing-table.fullname" . }}-secrets
              key: supabase-anon-key
        - name: SUPABASE_SERVICE_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "missing-table.fullname" . }}-secrets
              key: supabase-service-key
        - name: SUPABASE_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "missing-table.fullname" . }}-secrets
              key: supabase-jwt-secret
        - name: SERVICE_ACCOUNT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "missing-table.fullname" . }}-secrets
              key: service-account-secret
        - name: RESEND_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "missing-table.fullname" . }}-secrets
              key: resend-api-key
              optional: true
        # Telegram bot token for live-match notifications.
        # Optional: pod starts even if the key is absent; the dispatcher logs
        # a NotificationConfigError and skips telegram sends until the key
        # is populated (by ESO in prod, by values.secrets.telegramBotToken
        # locally/dev).
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ include "missing-table.fullname" . }}-secrets
              key: telegram-bot-token
              optional: true
        # Global kill switch for live-match notifications. Defaults to true.
        - name: NOTIFICATIONS_ENABLED
          value: {{ .Values.notifications.enabled | default true | quote }}
        # Non-sensitive configuration
        - name: APP_BASE_URL
          value: {{ .Values.backend.env.appBaseUrl | default "https://missingtable.com" | quote }}
        - name: REDIS_URL
          value: "redis://{{ include "missing-table.fullname" . }}-redis:6379"
        - name: ENVIRONMENT
          value: {{ .Values.backend.env.environment | quote }}
        - name: LOG_LEVEL
          value: {{ .Values.backend.env.logLevel | quote }}
        - name: DISABLE_SECURITY
          value: {{ .Values.backend.env.disableSecurity | quote }}
        # Version and build information
        - name: APP_VERSION
          value: {{ .Values.version | default "1.0.0" | quote }}
        {{- if .Values.buildId }}
        - name: BUILD_ID
          value: {{ .Values.buildId | quote }}
        {{- end }}
        {{- if .Values.commitSha }}
        - name: COMMIT_SHA
          value: {{ .Values.commitSha | quote }}
        {{- end }}
        {{- if .Values.buildDate }}
        - name: BUILD_DATE
          value: {{ .Values.buildDate | quote }}
        {{- end }}
        {{- range $key, $value := .Values.backend.env.extra }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: {{ .Values.backend.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.backend.livenessProbe.periodSeconds }}
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: {{ .Values.backend.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.backend.readinessProbe.periodSeconds }}
        {{- if .Values.backend.command }}
        command: {{- toYaml .Values.backend.command | nindent 8 }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "missing-table.fullname" . }}-backend
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "missing-table.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
spec:
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  selector:
    app.kubernetes.io/name: {{ include "missing-table.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
  type: ClusterIP
{{- if .Values.backend.service.loadBalancer.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "missing-table.fullname" . }}-backend-lb
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "missing-table.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend-lb
spec:
  ports:
  - port: {{ .Values.backend.service.loadBalancer.port }}
    targetPort: 8000
    name: http
  selector:
    app.kubernetes.io/name: {{ include "missing-table.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
  type: LoadBalancer
{{- end }}