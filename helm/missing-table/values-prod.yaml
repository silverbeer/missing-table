# Production environment configuration (LKE)
# Secrets come from External Secrets Operator (AWS Secrets Manager)
# Image tags and version info updated by CI workflow

namespace: missing-table

# Version information - updated by CI workflow
version: "1.5.0" # version-tag
buildId: "1073" # build-id
commitSha: "c8b3568674087d74d2f2f6db0bcf568122a27c18" # commit-sha  #pragma: allowlist secret
buildDate: "2026-06-02T12:12:20Z" # build-date

backend:
  replicaCount: 1

  image:
    repository: ghcr.io/silverbeer/missing-table-backend
    tag: "c8b3568" # backend-tag
    pullPolicy: IfNotPresent

  env:
    environment: "production"
    logLevel: "info"
    disableSecurity: "false"
    appBaseUrl: "https://missingtable.com"
    extra:
      CACHE_ENABLED: "true"
      # When set, every transactional email (password reset, invite,
      # request approval) includes this Reply-To header so user replies
      # land in a monitored inbox instead of the noreply@ from-address.
      # Change this to whatever inbox you actually read.
      RESEND_REPLY_TO: "support@contact.missingtable.com"

# Live-match notifications (explicit override — defaults to true in values.yaml)
# The TELEGRAM_BOT_TOKEN key inside the ESO-managed missing-table-secrets must
# exist in AWS Secrets Manager BEFORE any real telegram sends will succeed.
# Until then, the dispatcher logs NotificationConfigError and skips telegram.
notifications:
  enabled: true

# Redis for caching (deployed by this Helm chart)
redis:
  enabled: true

frontend:
  replicaCount: 1

  image:
    repository: ghcr.io/silverbeer/missing-table-frontend
    tag: "c8b3568" # frontend-tag
    pullPolicy: IfNotPresent

  # Production image uses nginx, not npm - override default command
  command: []

  # Vite + nginx: instant startup, no build at runtime
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - missingtable.com
    - www.missingtable.com
    - api.missingtable.com
  tls:
    - secretName: missing-table-tls  #pragma: allowlist secret
      hosts:
        - missingtable.com
        - www.missingtable.com
        - api.missingtable.com

# Image pull credentials - secret created by External Secrets Operator
# Keep registry/username so imagePullSecrets reference is added to deployments
imageCredentials:
  registry: ghcr.io
  username: silverbeer
  # password comes from ExternalSecret (missing-table-ghcr)
